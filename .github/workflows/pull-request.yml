name: Pull Request

on:
    pull_request:
        branches:
            - main
    
permissions:
    contents: read
    pull-requests: read
    
concurrency:
    group: pull-request-${{ github.event.pull_request.number }}
    cancel-in-progress: true
    
jobs:
    quality-gates:
        name: Quality Gates
        uses: ./.github/workflows/quality-gates.yml
        secrets: inherit
    